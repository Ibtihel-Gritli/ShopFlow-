spring.application.name=shopflow-backend

# Server Configuration
server.port=8080
server.servlet.context-path=/api

# Database - PostgreSQL (Production)
spring.datasource.url=jdbc:postgresql://localhost:5432/shopflow
spring.datasource.username=postgres
spring.datasource.password=password
spring.datasource.driver-class-name=org.postgresql.Driver

# JPA/Hibernate
spring.jpa.database-platform=org.hibernate.dialect.PostgreSQLDialect
spring.jpa.hibernate.ddl-auto=validate
spring.jpa.show-sql=false
spring.jpa.properties.hibernate.format_sql=true
spring.jpa.properties.hibernate.use_sql_comments=true

# JWT Configuration
jwt.secret=your-secret-key-change-this-in-production-minimum-256-bit-key
jwt.expiration=86400000
jwt.refresh-expiration=604800000

# Swagger/OpenAPI Configuration
springdoc.api-docs.path=/v3/api-docs
springdoc.swagger-ui.path=/swagger-ui.html
springdoc.swagger-ui.enabled=true

# Logging
logging.level.root=INFO
logging.level.com.shopflow=DEBUG
logging.level.org.springframework.security=DEBUG

# Jackson Configuration
spring.jackson.serialization.write-dates-as-timestamps=false
spring.jackson.default-property-inclusion=non_null

# Application Configuration
app.name=ShopFlow
app.version=1.0.0
